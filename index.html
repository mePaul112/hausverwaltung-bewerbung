<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wohnungsbewerbung – Körnerstraße 35</title>
<style>
 body{font-family:system-ui,sans-serif;max-width:640px;margin:2rem auto;padding:0 1rem;color:#222}
 h1{font-size:1.4rem} label{display:block;margin:.8rem 0 .2rem;font-weight:600}
 input,select,textarea{width:100%;padding:.5rem;border:1px solid #bbb;border-radius:6px;font-size:1rem}
 .row{display:flex;gap:.6rem} .row>div{flex:1}
 button{margin-top:1.2rem;padding:.7rem 1.2rem;border:0;border-radius:8px;background:#2a6;color:#fff;font-size:1rem;cursor:pointer}
 small{color:#666} .ok{color:#2a6;font-weight:600} .err{color:#c33}
</style>
</head>
<body>
<h1>Wohnungsbewerbung – Körnerstraße 35, Bremerhaven</h1>
<p><small>Mit diesem Formular melden Sie sich zur Sammelbesichtigung an und übermitteln Ihre Selbstauskunft. Pflichtfelder *.</small></p>
<form id="f">
 <label>Ihr Name *</label><input name="name" required>
 <div class="row">
  <div><label>E-Mail *</label><input type="email" name="email" required></div>
  <div><label>Telefon / WhatsApp *</label><input name="phone" required></div>
 </div>
 <label>Anzahl Personen im Haushalt *</label>
 <select name="personen" required><option value="">…</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
 <label>Einkommensart *</label>
 <select name="einkommensart" required><option value="">…</option><option>Angestellt</option><option>Selbstständig</option><option>Rente</option><option>Jobcenter</option><option>Sonstiges</option></select>
 <label>Monatliches Nettoeinkommen (Haushalt)</label>
 <select name="einkommen_spanne"><option value="">…</option><option>&lt; 1.500 €</option><option>1.500–2.500 €</option><option>2.500–3.500 €</option><option>&gt; 3.500 €</option></select>
 <div class="row">
  <div><label>Gewünschter Einzug ab</label><input type="date" name="einzug_ab"></div>
  <div><label>Haustiere?</label><input name="haustiere" placeholder="nein / Katze / …"></div>
 </div>
 <label>Besichtigungstermin *</label>
 <select name="slot" required><option value="">…</option><option>Sa. – 11:00 Uhr (Sammeltermin)</option><option>So. – 13:00 Uhr (Sammeltermin)</option></select>
 <label><input type="checkbox" name="consent" required style="width:auto"> Ich willige ein, dass meine Angaben zur Bearbeitung meiner Wohnungsbewerbung verarbeitet und nach Abschluss gelöscht werden. *</label>
 <input type="hidden" name="unit_id" id="unit_id">
 <button type="submit">Bewerbung absenden</button>
 <p id="msg"></p>
</form>
<script>
 // ====== KONFIG: hier deine Supabase-Werte eintragen (anon key ist öffentlich, RLS schützt) ======
 const SUPABASE_URL = "https://qdkfzzfnntfyvutztckl.supabase.co";
 const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFka2Z6emZubnRmeXZ1dHp0Y2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjgyOTYsImV4cCI6MjA5NzQ0NDI5Nn0.iXEsIiltmZjwrwk9YPNlgbadwxFrqBvkhDu55rrTCH8";
 // unit_id aus URL ?unit=BHV-KS35-04
 document.getElementById('unit_id').value = new URLSearchParams(location.search).get('unit') || '';
 document.getElementById('f').addEventListener('submit', async (e)=>{
   e.preventDefault();
   const fd = new FormData(e.target), o = {};
   fd.forEach((v,k)=>{
     if (k==='consent'){ o.consent = true; return; }
     if (v === '' || v == null) return;            // leere Felder weglassen -> NULL
     if (k==='personen'){ o.personen = parseInt(v,10); return; }
     if (k==='raucher'){ o.raucher = (v==='on'); return; }
     o[k] = v;
   });
   const msg = document.getElementById('msg');
   try{
     const r = await fetch(`${SUPABASE_URL}/rest/v1/applicants`, {
       method:'POST',
       headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Prefer':'return=minimal'},
       body: JSON.stringify(o)
     });
     if(r.ok){ e.target.reset(); msg.className='ok'; msg.textContent='Vielen Dank! Ihre Bewerbung ist eingegangen.'; }
     else { msg.className='err'; msg.textContent='Fehler beim Senden ('+r.status+'). Bitte später erneut versuchen.'; }
   }catch(err){ msg.className='err'; msg.textContent='Netzwerkfehler. Bitte später erneut versuchen.'; }
 });
</script>
</body>
</html>
